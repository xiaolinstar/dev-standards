# 跨项目环境变量键名注册表（L0 元数据真源）
# L3 运行时真源：VPS / 本机 gitignore 文件（不备份到 ~/.config）
# L2 本地 IaC：~/.config/xiaolinstar/<project>/github/<environment>/{variables,secrets}.env
# 结构：playbook/adr/0012-config-github-l2-only.md
# 机器校验：scripts/env/validate-registry.sh

version: 2
config_root: ~/.config/xiaolinstar
github_config:
  variables_file: variables.env
  secrets_file: secrets.env
  layout: github/<environment>/{variables,secrets}.env
  repository_scope_path: github/{variables,secrets}.env

categories:
  platform:
    description: 公网入口、TLS、监控栈
    projects: [xiaolin-gateway]
    l2_scope: repository
    l2_secret_prefix: SERVER_
  application:
    description: 业务 API / monorepo 可部署产物
    projects: [ai-todo, party-helper, drink-budget]
    l2_scope: environment
    l2_secret_prefix: DEPLOY_
  content:
    description: 文档站 / 内容站（容器静态服务）
    projects: [xiaolin-docs, xiaolin-life]
    l2_scope: repository
    l2_secret_prefix: SERVER_

projects:
  xiaolin-gateway:
    category: platform
    repo: xiaolinstar/xiaolin-gateway
    l2_category: platform
    l2_scope: repository
    l2_github_secrets: [SERVER_HOST, SERVER_USER, SERVER_PASSWORD]
    runtime_layout: root-dotenv
    load_order: [.env, .env.production]
    templates:
      - { path: .env.example, env: base }
      - { path: .env.production.example, env: production }
    docs: [docs/runtime-env-management.md, docs/env/README.md]

  ai-todo:
    category: application
    repo: xiaolinstar/ai-todo
    l2_category: application
    l2_scope: environment
    l2_github_vars:
      - DEPLOY_HOST
      - DEPLOY_USER
      - DEPLOY_PORT
      - DEPLOY_PATH
      - GHCR_DEPLOY_USER
      - CD_PUBLIC_API_URL
      - CD_LOCAL_HEALTH_URL
      - DEPLOY_BACKEND
      - K8S_OVERLAY
      - K8S_NAMESPACE
      - K8S_REGISTRY_MIRROR
    l2_github_secrets: [DEPLOY_SSH_KEY, DEPLOY_PASSWORD, GHCR_DEPLOY_TOKEN, CD_SMOKE_PAT]
    runtime_layout: app-scoped
    runtime_root: apps/api
    load_order: [.env, .env.local, .env.staging, .env.production]
    templates:
      - { path: apps/api/.env.example, env: base }
      - { path: apps/api/.env.local.example, env: local }
      - { path: apps/api/.env.staging.example, env: staging }
      - { path: apps/api/.env.production.example, env: production }
    github_environments:
      - name: staging
        l0_variables: docs/env/github/staging/variables.env.example
        l0_secrets: docs/env/github/staging/secrets.env.example
      - name: production
        l0_variables: docs/env/github/production/variables.env.example
        l0_secrets: docs/env/github/production/secrets.env.example
      - name: production-k8s
        l0_variables: docs/env/github/production-k8s/variables.env.example
        l0_secrets: docs/env/github/production-k8s/secrets.env.example
        notes: GitHub CD deploy target (111 k3s); app runtime remains AI_TODO_ENVIRONMENT=production
    docs: [docs/env/README.md, docs/env/github-environments.md]

  party-helper:
    category: application
    repo: xiaolinstar/party-helper
    l2_category: application
    l2_scope: environment
    l2_github_vars: [DEPLOY_HOST, DEPLOY_USER, DEPLOY_PORT, DEPLOY_PATH, GHCR_DEPLOY_USER]
    l2_github_secrets: [DEPLOY_SSH_KEY, DEPLOY_PASSWORD, GHCR_DEPLOY_TOKEN]
    runtime_layout: app-scoped
    runtime_root: apps/api
    templates:
      - { path: apps/api/.env.example, env: base }
      - { path: apps/api/.env.production.example, env: production }
    github_environments:
      - name: production
    docs: [docs/env/README.md, docs/deploy-api.md]

  drink-budget:
    category: application
    repo: xiaolinstar/drink-budget
    l2_category: application
    l2_scope: environment
    l2_github_vars: [DEPLOY_HOST, DEPLOY_USER, DEPLOY_PORT, DEPLOY_PATH, GHCR_DEPLOY_USER, CD_PUBLIC_SERVER_URL]
    l2_github_secrets: [DEPLOY_SSH_KEY, DEPLOY_PASSWORD, GHCR_DEPLOY_TOKEN]
    runtime_layout: app-scoped
    runtime_root: apps/api
    vps_runtime_files: [.env.production]
    upstream_host: 124.222.98.227
    upstream_port: 8020
    load_order: [.env.production]
    templates:
      - { path: apps/api/.env.example, env: base }
      - { path: apps/api/.env.local.example, env: local }
      - { path: apps/api/.env.production.example, env: production }
    github_environments:
      - name: production
    docs: [docs/env/README.md, docs/21-github-cd-config.md]

  xiaolin-docs:
    category: content
    repo: xiaolinstar/xiaolin-docs
    l2_category: content
    l2_scope: repository
    l2_github_vars: [DOCKER_BAIDU_ANALYTICS_ID, PAGES_BAIDU_ANALYTICS_ID]
    l2_github_secrets: [SERVER_HOST, SERVER_USER, SERVER_PASSWORD]
    runtime_layout: root-dotenv
    vps_runtime_env: false
    upstream_host: 124.222.98.227
    upstream_port: 8080
    cos_credentials: ~/.cos.yaml
    cos_prefix: docs
    load_order: [.env]
    templates:
      - { path: .env.example, env: base }
    docs: [docs/env/README.md, docs/sre/planning/media-standards.md]

  xiaolin-life:
    category: content
    repo: xiaolinstar/xiaolin-life
    l2_category: content
    l2_scope: repository
    l2_github_secrets: [SERVER_HOST, SERVER_USER, SERVER_PASSWORD]
    runtime_layout: root-dotenv
    vps_runtime_env: false
    upstream_host: 124.222.98.227
    upstream_port: 8081
    cos_credentials: ~/.cos.yaml
    load_order: [.env]
    templates:
      - { path: .env.example, env: base }
    docs: [docs/env/README.md, docs/MEDIA-NAMESPACE.md]
